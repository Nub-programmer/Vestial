version: '3.8'

services:
  # PostgreSQL database (alternative to Neon)
  postgres:
    image: postgres:15-alpine
    container_name: vestial-db
    environment:
      POSTGRES_USER: vestial
      POSTGRES_PASSWORD: vestial_dev
      POSTGRES_DB: vestial
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vestial"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js application
  app:
    build: .
    container_name: vestial-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://vestial:vestial_dev@postgres:5432/vestial
      GROQ_API_KEY: ${GROQ_API_KEY}
      NEWSAPI_KEY: ${NEWSAPI_KEY}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY}
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

volumes:
  postgres_data:

networks:
  default:
    name: vestial-network
